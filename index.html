<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pizarra WebRTC + PeerJS</title>
  <style>
    :root { 
      --bg: #0f172a; 
      --panel: #111827; 
      --ink: #16a34a; 
      --txt: #e5e7eb; 
      --muted: #9ca3af;
      --border: #374151;
    }
    * { box-sizing: border-box; }
    body { margin:0; background: var(--bg); color: var(--txt); font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; }
    .wrap { display:grid; grid-template-rows: auto 1fr; height: 100dvh; }
    header { display:flex; gap:.5rem; align-items:center; padding:.5rem; flex-wrap:wrap; background: linear-gradient(180deg, rgba(17,24,39,.95), rgba(17,24,39,.6)); backdrop-filter: blur(6px); position: sticky; top:0; z-index:10; }
    header .toolbar-controls { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; flex:1 1 auto; }
    header .toolbar-controls > *, #menuToggle { border:1px solid var(--border); background:#0b1220; color:var(--txt); padding:.45rem .6rem; border-radius:.55rem; font-size:14px; line-height:1; }
    header label { display:flex; align-items:center; gap:.4rem; }
    header input[type="text"], header input[type="number"] { background:#0b1220; color:var(--txt); border:1px solid var(--border); padding:.35rem .5rem; height:28px; }
    header input::placeholder { color:#cbd5e1; opacity:.8; }
    header input[type="color"] { width:40px; height:28px; padding:0; border-radius:.35rem; }
    header .btn { cursor:pointer; user-select:none; }
    header .btn[disabled] { opacity:.5; cursor:not-allowed; }
    #status { margin-left:auto; border:none; background:transparent; color:var(--muted); padding:0; }
    header[data-collapsed="true"] .toolbar-controls { display:none; }
    header[data-collapsed="true"] #status { margin-left:0; }
    #menuToggle { display:none; }
    @media (max-width: 900px){
      header { flex-direction:column; align-items:stretch; }
      header .toolbar-controls { width:100%; }
      header[data-collapsed="false"] .toolbar-controls { display:flex; }
      #menuToggle { display:inline-flex; justify-content:center; align-items:center; gap:.35rem; }
      #status { align-self:flex-end; }
    }
    .hidden { display:none !important; }
    .board { height: 100%; overflow:auto; background:#0b1220; }
    #canvas { width:100%; display:block; background:#0b1220; touch-action: none; cursor: crosshair; }
    .sep { width:1px; height:28px; background:var(--border); margin:0 .25rem; }
    .chip { font-variant-numeric: tabular-nums; color:#a7f3d0; border-color:#065f46; }
    .pill { border-radius:999px; padding:.25rem .6rem; border:1px solid #065f46; background:#042f2e; }
    .kbd { padding:.1rem .35rem; border:1px solid var(--border); border-bottom-width:2px; border-radius:.35rem; background:#0b1220; color:#e5e7eb; }

    /* QR overlay */
    .qr-overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.65); z-index:50; }
    .qr-card{ background:#0b1220; border:1px solid var(--border); padding:1rem; border-radius:12px; width:min(92vw,420px); }
    .qr-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
    .qr-box{ display:flex; justify-content:center; padding:1rem; background:#fff; border-radius:12px; }
    .qr-meta{ font-size:.9rem; color:var(--muted); margin-top:.5rem; word-break:break-all; }
  </style>
  <!-- PeerJS + QR + jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header data-collapsed="false">
      <button id="menuToggle" class="btn menu-toggle" type="button" aria-expanded="true" aria-controls="toolbarControls">Ocultar menú</button>
      <div id="toolbarControls" class="toolbar-controls">
        <strong>Modo:</strong>
        <button id="hostBtn" class="btn">Anfitrión</button>
        <span class="sep"></span>
        <label>Código <input id="code" type="text" placeholder="ABC123" style="width:7rem;text-transform:uppercase"/></label>
        <button id="joinBtn" class="btn">Unirse</button>
        <span id="myCode" class="pill chip host-only" title="Código de la sesión" style="display:none"></span>
        <button id="qrBtn" class="btn host-only" title="Mostrar QR de conexión">QR</button>
        <span class="sep edit-only"></span>
        <label class="edit-only">Color <input id="color" type="color" value="#16a34a" /></label>
        <label class="edit-only">Grosor <input id="size" type="number" min="1" max="50" value="4" style="width:4.5rem"/></label>
        <label class="edit-only">Grosor borrador <input id="eraserSize" type="number" min="1" max="100" value="20" style="width:4.5rem"/></label>
        <button id="eraser" class="btn edit-only">Borrador</button>
        <span class="sep host-only"></span>
        <button id="clear" class="btn host-only">Limpiar</button>
        <label class="host-only">Fondo <input id="bg" type="color" value="#0b1220" /></label>
        <button id="savePdf" class="btn host-only" title="Guardar como PDF">Guardar PDF</button>
        <span class="sep host-only"></span>
        <label class="host-only"><input id="readonly" type="checkbox"/> Solo proyectar</label>
        <label class="host-only"><input id="lockGuests" type="checkbox"/> Solo anfitrión dibuja</label>
      </div>
      <span id="status">sin conexión</span>
    </header>
    <div class="board" id="board">
      <canvas id="canvas" style="height: calc(100vh - 56px);"></canvas>
    </div>
  </div>

  <!-- QR modal -->
  <div class="qr-overlay" id="qrOverlay" role="dialog" aria-modal="true">
    <div class="qr-card">
      <div class="qr-head">
        <strong>Conéctate a esta pizarra</strong>
        <button id="qrClose" class="btn">Cerrar</button>
      </div>
      <div class="qr-box"><div id="qr"></div></div>
      <div class="qr-meta">
        <div>Abre esta URL y usa el código <span class="kbd" id="qrCodeText">—</span></div>
        <div id="qrUrl">—</div>
      </div>
    </div>
  </div>

<script>
// ===== Configuración PeerJS/STUN-TURN =====
const peerConfig = {
  host: '0.peerjs.com',
  port: 443,
  path: '/',
  secure: true,
  config: {
    iceServers: [
      { urls: 'stun:stun.relay.metered.ca:80' },
      { urls: 'turn:standard.relay.metered.ca:80', username: '9745e21b303bdaea589c29bc', credential: 'UgG56tBqCEGNjzLY' },
      { urls: 'turn:standard.relay.metered.ca:443?transport=tcp', username: '9745e21b303bdaea589c29bc', credential: 'UgG56tBqCEGNjzLY' }
    ]
  }
};

let peer = null;          // instancia local
let conn = null;          // conexión a anfitrión (cuando eres cliente)
const guests = new Map(); // conexiones a invitados (cuando eres anfitrión)
let isHost = false;
let drawing = false;
let last = null;          // último punto
let erasing = false;
let guestLock = false;    // bloqueo impuesto por el anfitrión
let remoteLock = false;   // bloqueo recibido cuando eres invitado
const statusEl = document.getElementById('status');

const board = document.getElementById('board');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cssHeight = null; // altura del canvas en CSS px
let lastViewportHeight = null;

// ===== Canvas escalado HiDPI + altura dinámica =====
function setCanvasCssHeight(h){
  canvas.style.height = h+"px"; // esto dispara el ResizeObserver
  adjustGuestView();
}

function headerHeight(){
  return headerEl ? headerEl.offsetHeight : 56;
}

function desiredCanvasHeight(){
  const value = Math.round(window.innerHeight - headerHeight());
  return Math.max(200, value);
}

function syncViewportWithGuests(){
  if(!isHost) return;
  if(typeof cssHeight !== 'number') return;
  if(lastViewportHeight === cssHeight) return;
  lastViewportHeight = cssHeight;
  broadcast({type:'viewport', h: cssHeight});
}

function expandCanvasToViewport(force=false){
  const target = desiredCanvasHeight();
  const connected = !!(conn && conn.open);
  let next = cssHeight;
  if(cssHeight === null || force) next = target;
  else if(isHost) next = target;
  else if(!connected && typeof cssHeight === 'number' && target > cssHeight) next = target;
  if(next !== cssHeight){
    cssHeight = next;
    setCanvasCssHeight(cssHeight);
    syncViewportWithGuests();
  } else if(force && cssHeight !== null){
    setCanvasCssHeight(cssHeight);
    syncViewportWithGuests();
  }
}

function resizeInternal(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = Math.max(1, Math.floor(w*dpr));
  canvas.height = Math.max(1, Math.floor(h*dpr));
  ctx.setTransform(1,0,0,1,0,0); // reset
  ctx.scale(dpr, dpr);
  try{ ctx.putImageData(img,0,0); }catch(e){}
}
const ro = new ResizeObserver(()=> resizeInternal());
ro.observe(canvas);
window.addEventListener('load', ()=>{
  expandCanvasToViewport(true);
  applyMenuState();
});

// ===== Utiles =====
const $ = (id)=>document.getElementById(id);
function rndCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function setStatus(t){ statusEl.textContent = t; }
const colorInput = $('color');
const sizeInput = $('size');
const eraserSizeInput = $('eraserSize');
const eraserBtn = $('eraser');
const clearBtn = $('clear');
const savePdfBtn = $('savePdf');
const bgInput = $('bg');
const readonlyToggle = $('readonly');
const lockToggle = $('lockGuests');
const myCodeEl = $('myCode');
const codeInput = $('code');
const guestControls = [colorInput, sizeInput, eraserBtn, eraserSizeInput];
const headerEl = document.querySelector('header');
let canvasScale = 1;
const menuToggleBtn = $('menuToggle');
const toolbarControls = $('toolbarControls');
const menuQuery = window.matchMedia('(max-width: 900px)');
let manualMenuState = null;
const hostOnlyEls = Array.from(document.querySelectorAll('.host-only'));
const editControlEls = Array.from(document.querySelectorAll('.edit-only'));

function clamp(value, min, max){
  const n = Number.isFinite(value) ? value : min;
  return Math.min(max, Math.max(min, n));
}

function toggleHidden(elements, hidden){
  elements.forEach(el=>{
    if(!el) return;
    el.classList.toggle('hidden', hidden);
    if(hidden && typeof el.contains === 'function' && el.contains(document.activeElement)){
      try{ document.activeElement.blur(); }catch(e){}
    }
  });
}

function getPenSize(){
  const raw = parseFloat(sizeInput?.value);
  return clamp(Number.isFinite(raw) ? raw : 4, 1, 50);
}

function getEraserSize(){
  const raw = parseFloat(eraserSizeInput?.value);
  return clamp(Number.isFinite(raw) ? raw : 20, 1, 100);
}

function drawingLocked(){
  if(readonlyToggle?.checked) return true;
  if(!isHost && remoteLock) return true;
  return false;
}

function updateEraserLabel(){
  if(eraserBtn) eraserBtn.textContent = erasing ? 'Borrador (on)' : 'Borrador';
}

function updateLockToggle(){
  if(!lockToggle) return;
  lockToggle.disabled = !isHost;
  lockToggle.checked = isHost ? guestLock : remoteLock;
  lockToggle.title = isHost ? 'Impide que los invitados dibujen o borren la pizarra' : 'Solo el anfitrión puede cambiar esta opción';
}

function updateGuestControls(){
  const disable = !isHost && remoteLock;
  guestControls.forEach(el=>{
    if(el) el.disabled = disable;
  });
  if(disable) drawing = false;
}

function updateBackgroundInput(){
  if(!bgInput) return;
  const disable = !isHost && !!(conn && conn.open);
  bgInput.disabled = disable;
  if(disable) bgInput.value = currentBg;
}

function updateRoleUi(){
  const guestConnected = !isHost && !!(conn && conn.open);
  toggleHidden(hostOnlyEls, guestConnected);
  const hideEdit = guestConnected && remoteLock;
  toggleHidden(editControlEls, hideEdit);
}

function currentMenuCollapsed(){
  if(manualMenuState !== null) return manualMenuState;
  return menuQuery.matches;
}

function applyMenuState(){
  const collapsed = currentMenuCollapsed();
  if(headerEl) headerEl.dataset.collapsed = collapsed ? 'true' : 'false';
  if(menuToggleBtn){
    menuToggleBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    menuToggleBtn.setAttribute('aria-label', collapsed ? 'Mostrar menú de herramientas' : 'Ocultar menú de herramientas');
    menuToggleBtn.textContent = collapsed ? 'Mostrar menú' : 'Ocultar menú';
  }
  if(toolbarControls){
    toolbarControls.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
    if(collapsed) toolbarControls.setAttribute('inert', '');
    else toolbarControls.removeAttribute('inert');
  }
  expandCanvasToViewport();
  adjustGuestView();
}

menuToggleBtn?.addEventListener('click', ()=>{
  const collapsed = headerEl?.dataset.collapsed === 'true';
  manualMenuState = collapsed ? false : true;
  applyMenuState();
});

const handleMenuQueryChange = (e)=>{
  if(e && !e.matches){
    manualMenuState = null;
  }
  applyMenuState();
};

if(typeof menuQuery.addEventListener === 'function'){
  menuQuery.addEventListener('change', handleMenuQueryChange);
} else if(typeof menuQuery.addListener === 'function'){
  menuQuery.addListener(handleMenuQueryChange);
}

applyMenuState();

function refreshUi(){
  updateLockToggle();
  updateGuestControls();
  updateBackgroundInput();
  updateEraserLabel();
  if(!isHost && conn && conn.open){
    setStatus(remoteLock ? 'Bloqueado por anfitrión' : 'conectado');
  }
  updateRoleUi();
  adjustGuestView();
}

function adjustGuestView(){
  if(isHost){
    canvasScale = 1;
    canvas.style.transform = '';
    canvas.style.transformOrigin = '';
    board.style.height = '';
    board.style.overflow = 'auto';
    document.body.style.overflow = '';
    return;
  }
  canvas.style.transform = '';
  canvas.style.transformOrigin = '';
  const headerH = headerHeight();
  const availableHeight = Math.max(200, window.innerHeight - headerH);
  const availableWidth = window.innerWidth;
  const targetHeight = cssHeight || canvas.offsetHeight || availableHeight;
  const targetWidth = canvas.offsetWidth || availableWidth;
  let scale = 1;
  if(targetHeight > 0) scale = Math.min(scale, availableHeight / targetHeight);
  if(targetWidth > 0) scale = Math.min(scale, availableWidth / targetWidth);
  if(!Number.isFinite(scale) || scale <= 0) scale = 1;
  canvasScale = scale;
  if(scale < 1){
    canvas.style.transform = `scale(${scale})`;
    canvas.style.transformOrigin = 'top left';
    board.style.height = `${availableHeight}px`;
    board.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
  } else {
    canvas.style.transform = '';
    board.style.height = '';
    board.style.overflow = 'auto';
    document.body.style.overflow = '';
  }
}

// ===== Dibujo local y sincronización =====
function drawLine(x0,y0,x1,y1,color,size,mode){
  ctx.save();
  if(mode==='erase'){ ctx.globalCompositeOperation = 'destination-out'; ctx.strokeStyle = 'rgba(0,0,0,1)'; }
  else { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = color; }
  ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke(); ctx.restore();
}
// Puntero/Toque
function pointerXY(e){
  const rect = canvas.getBoundingClientRect();
  const scale = canvasScale || 1;
  const clientX = (e.clientX ?? e.touches?.[0]?.clientX ?? 0);
  const clientY = (e.clientY ?? e.touches?.[0]?.clientY ?? 0);
  const x = (clientX - rect.left) / scale;
  const y = (clientY - rect.top) / scale;
  return {x,y};
}
function down(e){
  if(drawingLocked()) return;
  drawing = true; last = pointerXY(e);
}
function move(e){
  if(!drawing) return;
  if(!isHost && remoteLock){ drawing = false; return; }
  const p = pointerXY(e);
  const color = erasing ? '#000000' : (colorInput?.value || '#16a34a');
  const size = erasing ? getEraserSize() : getPenSize();
  drawLine(last.x,last.y,p.x,p.y,color,size, erasing?'erase':'draw');
  emitStroke({x0:last.x,y0:last.y,x1:p.x,y1:p.y,color,size,mode: erasing?'erase':'draw'});
  last = p; e.preventDefault();
}

function up(){ drawing=false; last=null; }

function clearCanvas(){
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}

canvas.addEventListener('pointerdown', down);
canvas.addEventListener('pointermove', move);
canvas.addEventListener('pointerup', up);
canvas.addEventListener('pointerleave', up);
canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});

sizeInput?.addEventListener('change', ()=>{ sizeInput.value = String(getPenSize()); });
eraserSizeInput?.addEventListener('change', ()=>{ eraserSizeInput.value = String(getEraserSize()); });

const qrOverlay = document.getElementById('qrOverlay');
const qrClose = document.getElementById('qrClose');
const qrUrl = document.getElementById('qrUrl');
const qrCodeText = document.getElementById('qrCodeText');
const qrBtn = document.getElementById('qrBtn');
let qrInstance = null;
let shareUrl = '';
let currentBg = bgInput?.value || '#0b1220';

function ensureQr(){
  if(!qrInstance){
    qrInstance = new QRCode(document.getElementById('qr'), { width:240, height:240, correctLevel: QRCode.CorrectLevel.M });
  }
  return qrInstance;
}

function showQr(){
  if(!shareUrl){
    alert('Activa el modo anfitrión para obtener un código y enlace de conexión.');
    return;
  }
  ensureQr().makeCode(shareUrl);
  qrUrl.textContent = shareUrl;
  qrCodeText.textContent = myCodeEl?.textContent || '—';
  qrOverlay.style.display = 'flex';
}

function hideQr(){ qrOverlay.style.display = 'none'; }

qrBtn.addEventListener('click', showQr);
qrClose.addEventListener('click', hideQr);
qrOverlay.addEventListener('click', e=>{ if(e.target === qrOverlay) hideQr(); });
document.addEventListener('keydown', e=>{ if(e.key === 'Escape') hideQr(); });

updateEraserLabel();

eraserBtn?.addEventListener('click', ()=>{
  erasing = !erasing;
  updateEraserLabel();
});

function emitBg(color){
  if(!isHost) return;
  broadcast({type:'bg', color});
}

function applyBackground(color, propagate=true){
  currentBg = color;
  canvas.style.background = color;
  board.style.background = color;
  if(bgInput) bgInput.value = color;
  if(propagate) emitBg(color);
}

applyBackground(currentBg, false);
bgInput?.addEventListener('input', e=>{
  if(!isHost){
    e.target.value = currentBg;
    return;
  }
  applyBackground(e.target.value);
});

lockToggle?.addEventListener('change', ()=>{
  if(!isHost){
    lockToggle.checked = remoteLock;
    return;
  }
  guestLock = lockToggle.checked;
  refreshUi();
  broadcast({type:'lock', value: guestLock});
});

refreshUi();
if(sizeInput) sizeInput.value = String(getPenSize());
if(eraserSizeInput) eraserSizeInput.value = String(getEraserSize());
window.addEventListener('resize', ()=>{
  expandCanvasToViewport();
  adjustGuestView();
});

function canvasSnapshot(){
  const off = document.createElement('canvas');
  off.width = canvas.width;
  off.height = canvas.height;
  const offCtx = off.getContext('2d');
  offCtx.fillStyle = currentBg;
  offCtx.fillRect(0,0,off.width,off.height);
  offCtx.drawImage(canvas,0,0);
  return off.toDataURL('image/png');
}

function applySnapshot(dataUrl){
  if(!dataUrl) return;
  const img = new Image();
  img.onload = ()=>{
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    ctx.restore();
  };
  img.src = dataUrl;
}

function sendStateTo(connection){
  try{
    connection.send({
      type:'state',
      h: cssHeight,
      bg: currentBg,
      lock: guestLock,
      image: canvasSnapshot()
    });
  }catch(e){}
}

function handleIncoming(msg, source){
  if(!msg || typeof msg !== 'object') return;
  switch(msg.type){
    case 'stroke': {
      const s = msg.s;
      if(!s) break;
      drawLine(s.x0,s.y0,s.x1,s.y1,s.color,s.size,s.mode);
      if(isHost) broadcast(msg, source?.peer);
      break;
    }
    case 'clear':
      clearCanvas();
      if(isHost) broadcast(msg, source?.peer);
      break;
    case 'bg':
      if(typeof msg.color === 'string'){
        applyBackground(msg.color, false);
      }
      if(isHost) broadcast(msg, source?.peer);
      break;
    case 'lock':
      if(typeof msg.value === 'boolean'){
        if(isHost){
          if(source){
            try{ source.send({type:'lock', value: guestLock}); }catch(e){}
          }
        } else {
          remoteLock = msg.value;
          refreshUi();
        }
      }
      break;
    case 'state':
      if(!isHost){
        if(msg.bg) applyBackground(msg.bg, false);
        if(typeof msg.lock === 'boolean'){
          remoteLock = msg.lock;
          refreshUi();
        }
        if(typeof msg.h === 'number'){
          cssHeight = msg.h;
          setCanvasCssHeight(cssHeight);
        }
        if(msg.image) applySnapshot(msg.image);
      }
      break;
    case 'viewport':
      if(!isHost && typeof msg.h === 'number'){
        cssHeight = msg.h;
        setCanvasCssHeight(cssHeight);
      }
      break;
    case 'request-state':
    case 'hello':
      if(isHost && source) sendStateTo(source);
      break;
    default:
      break;
  }
}

function broadcast(payload, excludeId=null){
  if(!isHost) return;
  guests.forEach((g,id)=>{
    if(excludeId && id === excludeId) return;
    try{ g.open && g.send(payload); }catch(e){}
  });
}

function emitClear(){
  if(isHost){ broadcast({type:'clear'}); }
  else if(conn && conn.open && !remoteLock){ conn.send({type:'clear'}); }
}

clearBtn?.addEventListener('click', ()=>{
  clearCanvas();
  emitClear();
});

savePdfBtn?.addEventListener('click', ()=>{
  if(!window.jspdf){
    alert('No se ha podido cargar jsPDF.');
    return;
  }
  const dataUrl = canvasSnapshot();
  const { jsPDF } = window.jspdf;
  const w = canvas.clientWidth || board.clientWidth;
  const h = canvas.clientHeight || board.clientHeight;
  const orientation = w >= h ? 'landscape' : 'portrait';
  const pdf = new jsPDF({ orientation, unit:'px', format:[w, h] });
  pdf.addImage(dataUrl, 'PNG', 0, 0, w, h);
  pdf.save(`pizarra-${new Date().toISOString().slice(0,10)}.pdf`);
});

function cleanupPeer(){
  if(peer){
    try{ peer.destroy(); }catch(e){}
  }
  guests.forEach((c,id)=>{
    try{ c.close(); }catch(e){}
  });
  guests.clear();
  conn = null;
  peer = null;
  shareUrl = '';
  isHost = false;
  guestLock = false;
  remoteLock = false;
  lastViewportHeight = null;
  refreshUi();
  if(myCodeEl){
    myCodeEl.style.display = 'none';
    myCodeEl.textContent = '';
  }
}

function buildShareUrl(code){
  try{
    const url = new URL(window.location.href);
    url.searchParams.set('code', code);
    return url.toString();
  }catch(e){
    return '';
  }
}

function updateStatusForGuests(){
  setStatus(`conectados: ${guests.size}`);
}

function startHost(){
  cleanupPeer();
  const id = rndCode();
  isHost = true;
  guestLock = false;
  remoteLock = false;
  refreshUi();
  peer = new Peer(id, peerConfig);
  setStatus('creando sesión…');
  peer.on('open', ()=>{
    if(myCodeEl){
      myCodeEl.style.display='inline-block';
      myCodeEl.textContent=id;
    }
    shareUrl = buildShareUrl(id);
    setStatus('esperando conexiones');
  });
  peer.on('connection', c=>{
    guests.set(c.peer, c);
    updateStatusForGuests();
    c.on('close', ()=>{
      guests.delete(c.peer);
      updateStatusForGuests();
    });
    c.on('data', msg=> handleIncoming(msg, c));
    sendStateTo(c);
    try{ c.send({type:'hello'}); }catch(e){}
  });
  peer.on('disconnected', ()=>{
    setStatus('desconectado');
    refreshUi();
  });
  peer.on('error', e=>{
    console.error(e);
    setStatus('error de conexión');
    refreshUi();
  });
}

function startGuest(code, { silent=false } = {}){
  const target = (code ?? codeInput?.value ?? '').trim().toUpperCase();
  if(!target){
    if(!silent) alert('Introduce un código válido.');
    return;
  }
  cleanupPeer();
  isHost = false;
  guestLock = false;
  remoteLock = false;
  refreshUi();
  peer = new Peer(null, peerConfig);
  setStatus('conectando…');
  peer.on('open', ()=>{
    conn = peer.connect(target, { reliable:true });
    refreshUi();
    conn.on('open', ()=>{
      setStatus('conectado');
      refreshUi();
      try{ conn.send({type:'request-state'}); }catch(e){}
    });
    conn.on('data', msg=> handleIncoming(msg, conn));
    conn.on('close', ()=>{
      setStatus('cerrado');
      conn = null;
      refreshUi();
    });
    conn.on('error', err=>{
      console.error(err);
      setStatus('error de conexión');
      refreshUi();
      if(!silent) alert('Error en la conexión con el anfitrión.');
    });
  });
  peer.on('error', e=>{
    console.error(e);
    setStatus('error de conexión');
    refreshUi();
    if(!silent) alert('No se pudo crear la conexión.');
  });
}

$('hostBtn').onclick = startHost;
$('joinBtn').onclick = ()=> startGuest();

function emitStroke(s){
  if(isHost){
    broadcast({type:'stroke', s});
  } else if(conn && conn.open && !remoteLock){
    conn.send({type:'stroke', s});
  }
}

const codeParam = (()=>{ try{ return new URL(window.location.href).searchParams.get('code'); }catch(e){ return null; }})();
if(codeParam){
  if(codeInput) codeInput.value = codeParam.toUpperCase();
  window.addEventListener('load', ()=> startGuest(codeParam, { silent:true }));
}
</script>
</body>
